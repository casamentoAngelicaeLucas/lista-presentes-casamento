<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Presença</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdfaf7; margin: 0; color: #4a3b32; }
    header { background: #c26d4c; color: white; padding: 40px 20px; text-align: center; }
    h1 { margin: 0; font-size: 26px; }
    .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(74,59,50,.1); box-sizing: border-box; border: 1px solid #f3ebe4; }
    select, button { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #eacfbf; border-radius: 5px; font-size: 16px; box-sizing: border-box; background: #fdfaf7; color: #4a3b32; }
    select { cursor: pointer; }
    button { background: #c26d4c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
    button:hover { background: #a45334; }
    .radio-group { margin: 25px 0; text-align: left; display: flex; flex-direction: column; gap: 12px; padding-left: 10px; }
    .radio-group label { cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 8px; color: #4a3b32; }
    .instrucao { font-size: 16px; color: #7a6a60; margin-bottom: 10px; text-align: center; line-height: 1.5; }
    .aviso-organizacao { font-size: 14px; color: #a45334; font-style: italic; text-align: center; margin-bottom: 20px; line-height: 1.4; }
  </style>
</head>
<body>

  <header>
    <h1>Lista de Confirmação de Presença</h1>
  </header>

  <div class="container">
    <p class="instrucao">Ficamos muito felizes em compartilhar este momento com você!<br>Por favor, selecione seu nome na lista abaixo para confirmar:</p>
    
    <p class="aviso-organizacao">*Nota: Após confirmar, seu nome sairá desta lista automaticamente para fins de organização dos noivos.*</p>
    
    <select id="selectConvidados">
      <option value="">Carregando lista de convidados...</option>
    </select>

    <div class="radio-group">
      <label><input type="radio" name="presenca" value="Sim! Estarei lá com vocês ❤️" checked> Sim! Estarei lá com vocês ❤️</label>
      <label><input type="radio" name="presenca" value="Não poderei ir"> Não poderei ir, mas desejo toda a felicidade do mundo ✨</label>
    </div>

    <button onclick="enviarResposta()">Enviar Resposta</button>
  </div>

  <script>
    const SUPABASE_URL = "https://jncjiqyakzztfgzldshi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      global: { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    });

    async function carregarListaPublica() {
      const { data: lista, error } = await _supabase
        .from('convidados')
        .select('*')
        .or('respondido.eq.FALSE,respondido.is.null,respondido.eq.false')
        .order('nome', { ascending: true });

      if (error) {
        console.error("Erro Supabase:", error);
        document.getElementById("selectConvidados").innerHTML = '<option value="">Erro ao carregar lista</option>';
        return;
      }

      const select = document.getElementById("selectConvidados");
      select.innerHTML = '<option value="">-- Clique aqui para escolher seu nome --</option>';

      if (!lista || lista.length === 0) {
        select.innerHTML = '<option value="">Todos os convidados já responderam!</option>';
        return;
      }

      lista.forEach(convidado => {
        const option = document.createElement("option");
        option.value = convidado.id;
        option.textContent = convidado.nome;
        select.appendChild(option);
      });
    }

    async function enviarResposta() {
      const idConvidado = document.getElementById("selectConvidados").value;
      const valorPresenca = document.querySelector('input[name="presenca"]:checked').value;

      if (!idConvidado) {
        alert("Por favor, selecione o seu nome na lista antes de enviar.");
        return;
      }

      const { error } = await _supabase
        .from('convidados')
        .update({ 
          resposta: valorPresenca,
          respondido: 'TRUE'
        })
        .eq('id', idConvidado);

      if (error) {
        alert("Houve um erro ao salvar sua resposta. Tente novamente.");
        console.error(error);
      } else {
        alert("Sua resposta foi enviada com carinho! Muito obrigado.");
        carregarListaPublica();
      }
    }

    carregarListaPublica();
  </script>
</body>
</html>
