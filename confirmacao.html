<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Presença</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; color: #333; }
    header { background: #d46a92; color: white; padding: 30px; text-align: center; }
    .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); box-sizing: border-box; }
    select, button { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    button { background: #d46a92; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #b55376; }
    .radio-group { margin: 20px 0; text-align: center; }
    .radio-group label { margin: 0 15px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .instrucao { font-size: 15px; color: #555; margin-bottom: 10px; text-align: center; }
  </style>
</head>
<body>

  <header>
    <h1>Confirmação de Presença</h1>
  </header>

  <div class="container">
    <p class="instrucao">Selecione o seu nome na lista abaixo pública para confirmar:</p>
    
    <select id="selectConvidados">
      <option value="">Carregando lista de convidados...</option>
    </select>

    <div class="radio-group">
      <label><input type="radio" name="presenca" value="sim" checked> Confirmo</label>
      <label><input type="radio" name="presenca" value="nao"> Não vou</label>
    </div>

    <button onclick="enviarResposta()">Enviar Resposta</button>
  </div>

  <script>
    const SUPABASE_URL = "https://jncjiqyakzztfgzldshi.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuY2ppcXlha3p6dGZnemxkc2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU5NjQ2MzgsImV4cCI6MjAzMTU0MDYzOH0.6_f9pXn9Y_8_r4_z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Esta função busca no Supabase apenas quem ainda NÃO respondeu (onde 'confirmado' é vazio/null)
    async function carregarListaPublica() {
      const { data: lista, error } = await _supabase
        .from('Convidados')
        .select('*')
        .is('confirmado', null)
        .order('nome', { ascending: true });

      if (error) {
        console.error("Erro ao carregar os convidados:", error);
        document.getElementById("selectConvidados").innerHTML = '<option value="">Erro ao carregar lista</option>';
        return;
      }

      const select = document.getElementById("selectConvidados");
      select.innerHTML = '<option value="">-- Clique aqui e escolha seu nome --</option>';

      if (!lista || lista.length === 0) {
        select.innerHTML = '<option value="">Todos os convidados já responderam!</option>';
        return;
      }

      lista.forEach(convidado => {
        const option = document.createElement("option");
        option.value = convidado.id;
        option.textContent = convidado.nome;
        select.appendChild(option);
      });
    }

    async function enviarResposta() {
      const idConvidado = document.getElementById("selectConvidados").value;
      const respostaRadio = document.querySelector('input[name="presenca"]:checked').value;

      if (!idConvidado) {
        alert("Por favor, selecione o seu nome na lista antes de enviar.");
        return;
      }

      const statusConfirmacao = (respostaRadio === "sim");

      // Salva a resposta na linha exata do convidado selecionado
      const { error } = await _supabase
        .from('Convidados')
        .update({ confirmado: statusConfirmacao })
        .eq('id', idConvidado);

      if (error) {
        alert("Houve um erro ao salvar sua resposta. Tente novamente.");
        console.error(error);
      } else {
        alert("Sua resposta foi enviada com sucesso! Obrigado.");
        // Atualiza a lista na tela para que o nome suma imediatamente
        carregarListaPublica();
      }
    }

    // Executa a busca assim que a página abre
    carregarListaPublica();
  </script>
</body>
</html>
