<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Presentes</title>
  <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdfaf7; margin: 0; padding: 20px; color: #4a3b32; }
    header { background: #c26d4c; color: white; padding: 40px 20px; text-align: center; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(194, 109, 76, 0.15); }
    h1 { margin: 0; font-size: 28px; font-family: 'Georgia', serif; }
    header p { margin: 15px 0 0 0; font-size: 16px; opacity: 0.95; line-height: 1.5; }
    
    /* Seção horizontal para os itens já escolhidos */
    .secao-escolhidos { max-width: 1200px; margin: 0 auto 40px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 12px rgba(74, 59, 50, 0.05); border: 1px solid #eacfbf; }
    .titulo-escolhidos { font-size: 18px; font-family: 'Georgia', serif; color: #c26d4c; margin: 0 0 15px 0; text-align: left; font-weight: bold; }
    
    /* Configuração do Carrossel em Miniatura para Celular */
    .carrossel-escolhidos { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .carrossel-escolhidos::-webkit-scrollbar { height: 6px; }
    .carrossel-escolhidos::-webkit-scrollbar-thumb { background: #eacfbf; border-radius: 4px; }
    
    /* Tamanho miniatura dos cards no carrossel */
    .carrossel-escolhidos .card-presente { min-width: 180px; max-width: 180px; padding: 12px; }
    .carrossel-escolhidos .card-presente img { height: 100px; margin-bottom: 8px; }
    .carrossel-escolhidos .nome-presente { font-size: 14px; margin: 5px 0; }
    .carrossel-escolhidos .status-reservado { font-size: 12px; padding: 8px; }
    .carrossel-escolhidos .btn-link-loja { font-size: 11px; padding: 5px; }
