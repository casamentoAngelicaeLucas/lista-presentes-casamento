<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Controle - Casamento</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 20px; color: #333; }
    h2 { color: #d46a92; text-align: center; margin-top: 30px; }
    .login-container, .lista-container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); }
    input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #d46a92; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #b55376; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #f9f9f9; color: #d46a92; font-weight: bold; }
    .status-sim { color: green; font-weight: bold; }
    .status-nao { color: #777; font-style: italic; }
    .item-reservado { color: #b55376; font-weight: bold; }
    .item-disponivel { color: #777; font-style: italic; }
  </style>
</head>
<body>

  <div id="loginSection" class="login-container">
    <h2>Acesso Restrito</h2>
    <p>Digite a senha para visualizar as listas completas:</p>
    <input type="password" id="senhaInput" placeholder="Senha">
    <button onclick="verificarSenha()">Entrar</button>
  </div>

  <div id="listaSection" class="lista-container" style="display: none;">
    
    <h2>Lista de Convidados e Presenças</h2>
    <table>
      <thead>
        <tr>
          <th>Nome do Convidado</th>
          <th>Presença / Resposta</th>
        </tr>
      </thead>
      <tbody id="tabelaCorpoConvidados"></tbody>
    </table>

    <h2>Lista de Presentes Escolhidos</h2>
    <table>
      <thead>
        <tr>
          <th>Presente</th>
          <th>Quem Escolheu</th>
        </tr>
      </thead>
      <tbody id="tabelaCorpoPresentes"></tbody>
    </table>

  </div>

  <script>
    const SUPABASE_URL = "https://jncjiqyakzztfgzldshi.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuY2ppcXlha3p6dGZnemxkc2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU5NjQ2MzgsImV4cCI6MjAzMTU0MDYzOH0.6_f9pXn9Y_8_r4_z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function verificarSenha() {
      const senha = document.getElementById("senhaInput").value;
      if (senha === "angelicaelucas") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("listaSection").style.display = "block";
        carregarPainelCompleto();
      } else {
        alert("Senha incorreta!");
      }
    }

    async function carregarPainelCompleto() {
      // 1. Puxa os Convidados
      const { data: convidados } = await _supabase.from('Convidados').select('*').order('nome', { ascending: true });
      const tabelaConvidados = document.getElementById("tabelaCorpoConvidados");
      tabelaConvidados.innerHTML = "";

      if (convidados) {
        convidados.forEach(c => {
          const tr = document.createElement("tr");
          let statusTexto = c.resposta ? `<span class="status-sim">${c.resposta}</span>` : '<span class="status-nao">Ainda não respondeu</span>';
          tr.innerHTML = `<td>${c.nome}</td><td>${statusTexto}</td>`;
          tabelaConvidados.appendChild(tr);
        });
      }

      // 2. Puxa os Presentes (ajustado para a tabela 'presentes' e coluna 'nome')
      const { data: presentes } = await _supabase.from('presentes').select('*').order('nome', { ascending: true });
      const tabelaPresentes = document.getElementById("tabelaCorpoPresentes");
      tabelaPresentes.innerHTML = "";

      if (presentes && presentes.length > 0) {
        presentes.forEach(p => {
          const tr = document.createElement("tr");
          let quemEscolheu = p.reservado_por ? `<span class="item-reservado">${p.reservado_por}</span>` : '<span class="item-disponivel">Disponível</span>';
          tr.innerHTML = `<td>${p.nome}</td><td>${quemEscolheu}</td>`;
          tabelaPresentes.appendChild(tr);
        });
      } else {
        tabelaPresentes.innerHTML = '<tr><td colspan="2" style="text-align:center;">Nenhum presente encontrado.</td></tr>';
      }
    }
  </script>
</body>
</html>
