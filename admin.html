<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel dos Noivos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
    font-family:Arial,sans-serif;
    background:#fdfaf7; /* Fundo suave da paleta */
    margin:0;
    padding:20px;
    color:#4a3b32; /* Texto escuro elegante */
}
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(74,59,50,.1);
    border: 1px solid #f3ebe4;
}
h1,h2{
    color:#c26d4c; /* Títulos em Terracota */
    text-align:center;
    font-family: 'Georgia', serif;
}
button{
    background:#c26d4c; /* Botão em Terracota */
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    display:block;
    margin:20px auto;
    font-weight:bold;
    transition:background 0.3s;
}
button:hover{
    background:#a45334; /* Terracota mais escuro no hover */
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    margin-bottom:40px;
}
th,td{
    border:1px solid #eacfbf; /* Bordas suaves combinando */
    padding:10px;
}
th{
    background:#c26d4c; /* Cabeçalho da tabela em Terracota */
    color:white;
}
tr:nth-child(even){
    background:#fdfaf7; /* Linhas alternadas no tom da paleta */
}
</style>
</head>
<body>

<div class="container">
    <h1>Painel de Controle do Casamento</h1>
    <button onclick="carregarTudo()">Atualizar Listas</button>

    <h2>Confirmação de Presença</h2>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Resposta</th>
            </tr>
        </thead>
        <tbody id="tbConvidados">
            <tr><td colspan="2">Carregando...</td></tr>
        </tbody>
    </table>

    <h2>Presentes Reservados</h2>
    <table>
        <thead>
            <tr>
                <th>Presente</th>
                <th>Quem escolheu</th>
            </tr>
        </thead>
        <tbody id="tbPresentes">
            <tr><td colspan="2">Carregando...</td></tr>
        </tbody>
    </table>
</div>

<script>
// Inicialização corrigida e direta do cliente Supabase
const supabaseClient = supabase.createClient(
    "https://jncjiqyakzztfgzldshi.supabase.co",
    "sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"
);

async function carregarConvidados(){
    const tabela = document.getElementById("tbConvidados");
    tabela.innerHTML = "";

    const { data, error } = await supabaseClient
        .from("convidados")
        .select("*")
        .order("nome");

    if(error){
        tabela.innerHTML = `<tr><td colspan="2">Erro: ${error.message}</td></tr>`;
        console.error(error);
        return;
    }

    if(!data || !data.length){
        tabela.innerHTML = `<tr><td colspan="2">Nenhum convidado.</td></tr>`;
        return;
    }

    data.forEach(c => {
        let resposta = "❌ Ainda não respondeu";
        
        // Ajuste para reconhecer tanto o valor lógico quanto o texto 'TRUE' do seu banco
        if (c.respondido === true || c.respondido === 'TRUE') {
            resposta = c.resposta || "✅ Confirmado";
        }

        tabela.innerHTML += `
            <tr>
                <td><strong>${c.nome}</strong></td>
                <td>${resposta}</td>
            </tr>
        `;
    });
}

async function carregarPresentes(){
    const tabela = document.getElementById("tbPresentes");
    tabela.innerHTML = "";

    const { data, error } = await supabaseClient
        .from("presentes")
        .select("*")
        .order("nome");

    if(error){
        tabela.innerHTML = `<tr><td colspan="2">Erro: ${error.message}</td></tr>`;
        console.error(error);
        return;
    }

    let encontrou = false;

    if (data) {
        data.forEach(p => {
            // Ajuste para validar corretamente se o item está reservado
            if (p.reservado === true || p.reservado === 'TRUE' || p.reservado_por) {
                encontrou = true;
                tabela.innerHTML += `
                    <tr>
                        <td>${p.nome}</td>
                        <td>🎁 ${p.reservado_por || "-"}</td>
                    </tr>
                `;
            }
        });
    }

    if(!encontrou){
        tabela.innerHTML = `<tr><td colspan="2">Nenhum presente reservado.</td></tr>`;
    }
}

async function carregarTudo(){
    await carregarConvidados();
    await carregarPresentes();
}

// Executa automaticamente ao abrir a tela
carregarTudo();
</script>

</body>
</html>
